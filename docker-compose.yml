# docker-compose.yml
# Starts: Prometheus, Grafana, Elasticsearch, Kibana
# MLflow and Airflow run locally (outside Docker) for easier debugging.
#
# Run with: docker-compose up -d

services:

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: boston_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: boston_grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/boston_mlops.json

    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    restart: unless-stopped

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: boston_elasticsearch

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    restart: unless-stopped

  # ── Kibana ────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: boston_kibana

    ports:
      - "5601:5601"

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    depends_on:
      - elasticsearch

    restart: unless-stopped

  # ── Airflow PostgreSQL ───────────────────────────────────────
  airflow_postgres:
    image: postgres:13
    container_name: airflow_postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    restart: unless-stopped

  # ── Airflow ──────────────────────────────────────────────────
  airflow:
    image: apache/airflow:slim-2.9.1-python3.11
    container_name: airflow

    depends_on:
      - airflow_postgres

    ports:
      - "8081:8080"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    volumes:
      - ./dags:/opt/airflow/dags

    command: airflow standalone

    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  elasticsearch_data: